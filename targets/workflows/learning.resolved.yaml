# Resolved workflow for the learn stage.
# Generated by: methodology skeleton (agile-methodology) + core-framework plugin contribution.
# This is a TARGET STATE file — hand-written to represent what the engine's workflow resolver
# should produce after plugin composition. Do not modify without updating the relevant plugins.
#
# NOTE: principle-decision is included here because schema.composed.json assigns it to the
# "learning" stage and it is listed in the learning stageArtifacts. Its plugin source is
# listed as "ARCHITECTURE.md (planned, not yet in any plugin)" — it has no workflow YAML yet.
# The state machine below is constructed from its schema.composed.json stateCategories.

format_version: "1.0"
resolved_at: "2026-03-27T00:00:00Z"
resolver_version: "0.1.0"

stage:
  name: learn
  display_name: "Learn"
  description: >
    Learning stage — capture lessons from delivery, run retrospective analysis,
    track patterns, detect recurrences, and close the delivery cycle. Produces
    lessons that may be promoted to rules, and decisions that govern future work.
  icon: "book-open"
  order: 7

source_plugins:
  - plugin: "@orqastudio/plugin-core-framework"
    contribution_point: learning-pipeline
    priority: 10

artifact_types:

  lesson:
    id_prefix: "IMPL"
    id_pattern: "^IMPL-[a-f0-9]{8}$"
    default_path: ".orqa/learning/lessons/"
    icon: "book-open"
    stage: learning
    source: "@orqastudio/plugin-core-framework"
    fields:
      required:
        id:
          type: string
          pattern: "^IMPL-[a-f0-9]{8}$"
        status:
          type: string
        recurrence:
          type: integer
          minimum: 0
      optional:
        title:
          type: string
        description:
          type: ["string", "null"]
        maturity:
          type: string
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: ["target", "type"]
    initial_status: captured
    statuses:
      - captured
      - exploring
      - active
      - recurring
      - review
      - completed
      - promoted
      - surpassed
      - archived
    state_categories:
      planning: [captured, exploring]
      active: [active, recurring]
      review: [review]
      completed: [completed]
      terminal: [promoted, surpassed, archived]
    state_machine:
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Lesson has been captured but not yet explored."

        exploring:
          category: planning
          description: "Lesson is being explored — root cause, impact, remediation."
          on_enter:
            - type: append_log
              params:
                message: "Lesson exploration started"

        active:
          category: active
          description: "Lesson is actively being tracked and applied."
          on_enter:
            - type: set_field
              params:
                field: started_at
                value: "${now}"
            - type: append_log
              params:
                message: "Lesson activated"

        recurring:
          category: active
          description: "Lesson pattern has recurred — tracking frequency and impact."
          on_enter:
            - type: append_log
              params:
                message: "Lesson marked as recurring pattern"

        review:
          category: review
          description: "Lesson is being reviewed for promotion or completion."
          on_enter:
            - type: append_log
              params:
                message: "Lesson entered review"

        completed:
          category: completed
          description: "Lesson has been addressed and documented."
          on_enter:
            - type: set_field
              params:
                field: completed_at
                value: "${now}"
            - type: append_log
              params:
                message: "Lesson completed"

        promoted:
          category: terminal
          description: "Lesson has been promoted to a rule."
          on_enter:
            - type: append_log
              params:
                message: "Lesson promoted to rule"

        surpassed:
          category: terminal
          description: "Lesson has been superseded by newer findings."

        archived:
          category: terminal
          description: "Lesson is archived."

      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin exploring root cause and remediation."

        - from: exploring
          to: active
          event: activate
          description: "Begin actively tracking this lesson."

        - from: exploring
          to: recurring
          event: mark_recurring
          description: "Pattern has recurred during exploration."

        - from: active
          to: completed
          event: complete
          description: "Lesson has been addressed."

        - from: active
          to: recurring
          event: mark_recurring
          description: "Pattern has recurred."

        - from: active
          to: review
          event: submit_for_review
          description: "Submit for promotion review."

        - from: active
          to: promoted
          event: promote
          description: "Promote directly to a rule."

        - from: recurring
          to: active
          event: resolve
          description: "Recurrence resolved — return to active tracking."

        - from: recurring
          to: completed
          event: complete
          description: "Recurring pattern resolved."

        - from: review
          to: completed
          event: complete
          description: "Lesson documented and complete."

        - from: review
          to: active
          event: request_changes
          description: "Further investigation needed."
          actions:
            - type: append_log
              params:
                message: "Changes requested during lesson review"

        - from: completed
          to: archived
          event: archive

        - from: completed
          to: surpassed
          event: surpass

        - from: promoted
          to: archived
          event: archive

        - from: surpassed
          to: archived
          event: archive

        - from: [captured, exploring]
          to: archived
          event: archive
          description: "Archive from non-active states."

  rule:
    id_prefix: "RULE"
    id_pattern: "^RULE-[a-f0-9]{8}$"
    default_path: ".orqa/learning/rules/"
    icon: "shield"
    stage: learning
    source: "@orqastudio/plugin-core-framework"
    fields:
      required:
        id:
          type: string
          pattern: "^RULE-[a-f0-9]{8}$"
        status:
          type: string
        enforcement:
          type: array
      optional:
        title:
          type: string
        description:
          type: ["string", "null"]
        demoted_date:
          type: string
          format: date
        demoted_reason:
          type: string
        replaced_by:
          type: string
        stability_threshold:
          type: number
          minimum: 1
          default: 10
        stability_count:
          type: number
          minimum: 0
          default: 0
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: ["target", "type"]
    initial_status: captured
    statuses:
      - captured
      - exploring
      - active
      - inactive
      - hold
      - review
      - completed
      - surpassed
      - archived
    state_categories:
      planning: [captured, exploring]
      active: [active, inactive, hold]
      review: [review]
      completed: [completed]
      terminal: [surpassed, archived]
    state_machine:
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Rule has been captured but not yet explored."

        exploring:
          category: planning
          description: "Rule is being explored — scope, enforcement mechanism, rationale."
          on_enter:
            - type: append_log
              params:
                message: "Rule exploration started"

        active:
          category: active
          description: "Rule is actively enforced."
          on_enter:
            - type: set_field
              params:
                field: activated_at
                value: "${now}"
            - type: append_log
              params:
                message: "Rule activated"

        inactive:
          category: active
          description: "Rule has been demoted — monitoring stability before removal."
          on_enter:
            - type: set_field
              params:
                field: demoted_date
                value: "${now}"
            - type: append_log
              params:
                message: "Rule demoted to inactive"

        hold:
          category: active
          description: "Rule enforcement is paused pending discussion."

        review:
          category: review
          description: "Rule is being reviewed for continued relevance."
          on_enter:
            - type: append_log
              params:
                message: "Rule entered review"

        completed:
          category: completed
          description: "Rule lifecycle is complete — enforcement superseded or no longer needed."
          on_enter:
            - type: append_log
              params:
                message: "Rule completed"

        surpassed:
          category: terminal
          description: "Rule has been superseded by a newer rule or enforcement mechanism."

        archived:
          category: terminal
          description: "Rule is archived."

      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin exploring rule scope and enforcement."

        - from: captured
          to: active
          event: activate
          description: "Fast-track to active enforcement."

        - from: exploring
          to: active
          event: activate
          description: "Begin active enforcement."

        - from: exploring
          to: hold
          event: pause
          description: "Pause exploration pending discussion."

        - from: active
          to: review
          event: submit_for_review
          description: "Trigger periodic relevance review."

        - from: active
          to: hold
          event: pause
          description: "Pause enforcement."

        - from: active
          to: inactive
          event: demote
          description: "Demote rule — enforcement replaced by tooling or no longer needed."

        - from: active
          to: archived
          event: archive
          description: "Archive an active rule directly."

        - from: inactive
          to: active
          event: reactivate
          description: "Re-activate a demoted rule (violations detected)."

        - from: inactive
          to: archived
          event: archive
          description: "Archive a demoted rule after stability period."

        - from: hold
          to: active
          event: resume
          description: "Resume enforcement."

        - from: hold
          to: exploring
          event: rescope
          description: "Return to exploration for re-scoping."

        - from: review
          to: active
          event: reaffirm
          description: "Rule is still relevant — return to active."

        - from: review
          to: completed
          event: retire
          description: "Rule is no longer needed — retire."

        - from: completed
          to: surpassed
          event: surpass

        - from: completed
          to: archived
          event: archive

        - from: surpassed
          to: archived
          event: archive

        - from: [captured, exploring, hold]
          to: archived
          event: archive
          description: "Archive from non-active states."

  principle-decision:
    # SOURCE NOTE: principle-decision is listed in schema.composed.json as
    # "ARCHITECTURE.md (planned, not yet in any plugin)". No plugin workflow YAML
    # exists yet. The state machine below is derived from its stateCategories in
    # schema.composed.json only. A plugin implementation is required in a later phase.
    id_prefix: "PD"
    id_pattern: "^PD-[a-f0-9]{8}$"
    default_path: ".orqa/learning/decisions/"
    icon: "scale"
    influence: high
    stage: learning
    source: "ARCHITECTURE.md (planned, not yet in any plugin)"
    fields:
      required:
        id:
          type: string
          pattern: "^PD-[a-f0-9]{8}$"
        status:
          type: string
      optional:
        title:
          type: string
        description:
          type: ["string", "null"]
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: ["target", "type"]
    initial_status: captured
    statuses:
      - captured
      - exploring
      - active
      - hold
      - review
      - completed
      - surpassed
      - archived
    state_categories:
      planning: [captured, exploring]
      active: [active, hold]
      review: [review]
      completed: [completed]
      terminal: [surpassed, archived]
    state_machine:
      # No plugin workflow YAML exists yet for principle-decision.
      # State machine is inferred from stateCategories in schema.composed.json.
      # Follows the same captured → exploring → active(hold) → review → completed
      # pattern as decision.workflow.yaml from core-framework (the closest analog).
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Principle decision has been captured but not yet explored."

        exploring:
          category: planning
          description: "Principle decision is being explored — rationale, alternatives, implications."
          on_enter:
            - type: append_log
              params:
                message: "Principle decision exploration started"

        active:
          category: active
          description: "Principle decision is active and applies to the project."
          on_enter:
            - type: set_field
              params:
                field: decided_at
                value: "${now}"
            - type: append_log
              params:
                message: "Principle decision activated"

        hold:
          category: active
          description: "Principle decision on hold pending further information or discussion."

        review:
          category: review
          description: "Principle decision is being reviewed for continued relevance."
          on_enter:
            - type: append_log
              params:
                message: "Principle decision entered review"

        completed:
          category: completed
          description: "Principle decision lifecycle complete."
          on_enter:
            - type: append_log
              params:
                message: "Principle decision completed"

        surpassed:
          category: terminal
          description: "Principle decision has been superseded by a newer decision."

        archived:
          category: terminal
          description: "Principle decision is archived."

      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin exploring the principle decision."

        - from: exploring
          to: active
          event: decide
          description: "Decision reached — activate."

        - from: exploring
          to: hold
          event: pause
          description: "Pause exploration pending information."

        - from: active
          to: review
          event: submit_for_review
          description: "Submit for periodic review."

        - from: active
          to: hold
          event: pause
          description: "Pause the decision."

        - from: hold
          to: active
          event: resume
          description: "Resume from hold."

        - from: hold
          to: exploring
          event: rescope
          description: "Return to exploration for re-evaluation."

        - from: review
          to: active
          event: reaffirm
          description: "Decision still applies — return to active."

        - from: review
          to: completed
          event: retire
          description: "Decision is no longer needed."

        - from: completed
          to: surpassed
          event: surpass

        - from: completed
          to: archived
          event: archive

        - from: surpassed
          to: archived
          event: archive

        - from: [captured, exploring, hold]
          to: archived
          event: archive
          description: "Archive from non-active states."

contribution_workflow:
  # Sub-workflow that runs within the learn stage.
  # Contributed by: @orqastudio/plugin-core-framework (point: learning-pipeline)
  initial_state: capture

  states:
    capture:
      category: completed
      description: "Lesson capture — create lessons from implementation experience, review outcomes, and process observations."
      on_enter:
        - type: append_log
          params:
            message: "Lesson capture started"

    retrospective:
      category: completed
      description: "Retrospective analysis — analyse captured lessons, identify what went well and what needs improvement."
      on_enter:
        - type: append_log
          params:
            message: "Retrospective started"

    pattern-tracking:
      category: completed
      description: "Pattern tracking — aggregate lessons across epics, detect trends and recurring themes."
      on_enter:
        - type: append_log
          params:
            message: "Pattern tracking started"

    recurrence-detection:
      category: completed
      description: "Recurrence detection — surface systemic issues that recur across multiple cycles, flag for process change."
      on_enter:
        - type: append_log
          params:
            message: "Recurrence detection started"

    learning_complete:
      category: completed
      description: "Learning complete — lessons captured, patterns analysed, improvements identified."
      on_enter:
        - type: set_field
          params:
            field: learning_completed_at
            value: "${now}"
        - type: append_log
          params:
            message: "Learning complete"

  transitions:
    # Entry into learning sub-workflow
    - from: learn
      to: capture
      event: begin_learning
      description: "Start the learning pipeline with lesson capture."

    # Forward path
    - from: capture
      to: retrospective
      event: lessons_captured
      description: "Lessons captured, begin retrospective analysis."

    - from: retrospective
      to: pattern-tracking
      event: retrospective_complete
      description: "Retrospective done, begin pattern tracking across lessons."

    - from: pattern-tracking
      to: recurrence-detection
      event: patterns_identified
      description: "Patterns identified, check for recurring systemic issues."

    - from: recurrence-detection
      to: learning_complete
      event: analysis_complete
      description: "Recurrence analysis done, learning pipeline complete."

    # Rework paths
    - from: retrospective
      to: capture
      event: capture_more
      description: "Retrospective revealed gaps — capture additional lessons."

    - from: pattern-tracking
      to: retrospective
      event: re_analyse
      description: "Pattern tracking revealed insights requiring deeper retrospective analysis."

    - from: recurrence-detection
      to: pattern-tracking
      event: recheck_patterns
      description: "Recurrence detection found new patterns — return to pattern tracking."

    # Exits from learning_complete
    - from: learning_complete
      to: done
      event: close_delivery
      description: "Learning phase complete, close the delivery."

    - from: learning_complete
      to: capture
      event: reopen_learning
      description: "New lessons surfaced — restart learning from capture."

# Relationship types applicable in the learning stage.
relationship_types:
  - type: codifies
    forward: "codifies"
    inverse: "codified-by"
    description: "A rule codifies (formalises) a lesson as an enforced constraint."
    from: ["rule"]
    to: ["lesson"]
    semantic: governance

  - type: enforces
    forward: "enforces"
    inverse: "enforced-by"
    description: "A rule enforces a decision."
    from: ["rule"]
    to: ["decision", "discovery-decision"]
    semantic: governance

  - type: governs
    forward: "governs"
    inverse: "governed-by"
    description: "A decision governs a rule."
    from: ["decision", "discovery-decision"]
    to: ["rule"]
    semantic: governance

  - type: teaches
    forward: "teaches"
    inverse: "taught-by"
    description: "A lesson teaches (informs) a decision."
    from: ["lesson"]
    to: ["decision", "discovery-decision"]
    semantic: knowledge-flow

  - type: promoted-to
    forward: "promoted-to"
    inverse: "promoted-from"
    description: "A lesson that was promoted into a rule."
    from: ["lesson"]
    to: ["rule"]
    semantic: governance

  - type: cautions
    forward: "cautions"
    inverse: "cautioned-by"
    description: "A lesson that cautions an epic — warns about a known risk or pitfall."
    from: ["lesson"]
    to: ["epic"]
    semantic: knowledge-flow

  - type: yields
    forward: "yields"
    inverse: "yielded-by"
    description: "A task that yields (produces) a lesson."
    from: ["task"]
    to: ["lesson"]
    semantic: knowledge-flow

  - type: documents
    forward: "documents"
    inverse: "documented-by"
    description: "A doc that documents a rule, decision, epic, or milestone."
    from: ["doc"]
    to: ["epic", "decision", "discovery-decision", "rule", "milestone"]
    semantic: knowledge-flow

contribution_metadata:
  contributed_by:
    - plugin: "@orqastudio/plugin-core-framework"
      contribution_point: learning-pipeline
      version: "0.1.0"
      priority: 10
