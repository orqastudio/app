# Resolved workflow for the review stage.
# Generated by: methodology skeleton (agile-methodology) + agile-review plugin contribution.
# This is a TARGET STATE file — hand-written to represent what the engine's workflow resolver
# should produce after plugin composition. Do not modify without updating the relevant plugins.

format_version: "1.0"
resolved_at: "2026-03-27T00:00:00Z"
resolver_version: "0.1.0"

stage:
  name: review
  display_name: "Review"
  description: >
    Review stage — code review, gate verification, and acceptance confirmation.
    Ensures deliverables meet quality standards and acceptance criteria before
    the delivery proceeds to the learning stage.
  icon: "check-circle"
  order: 6

source_plugins:
  - plugin: "@orqastudio/plugin-agile-review"
    contribution_point: review-process
    priority: 10

# Review stage has no dedicated artifact types of its own.
# Review activity is captured through gate outcomes and relationship-tracked on
# existing implementation artifacts (epics, tasks, milestones).
artifact_types: {}

contribution_workflow:
  # Sub-workflow that runs within the review stage.
  # Contributed by: @orqastudio/plugin-agile-review (point: review-process)
  initial_state: code_review

  states:
    code_review:
      category: review
      description: "Code review — verify implementation quality, standards compliance, and correctness."
      on_enter:
        - type: append_log
          params:
            message: "Code review started"

    gate_check:
      category: review
      description: "Gate check — run automated pre-checks and gather review context."
      on_enter:
        - type: append_log
          params:
            message: "Gate check started"

    acceptance_verification:
      category: review
      description: "Acceptance verification — validate deliverables against acceptance criteria."
      on_enter:
        - type: append_log
          params:
            message: "Acceptance verification started"

    review_complete:
      category: review
      description: "Review process complete — verdict rendered, ready to proceed."
      on_enter:
        - type: set_field
          params:
            field: review_completed_at
            value: "${now}"
        - type: append_log
          params:
            message: "Review complete"

  transitions:
    # Entry into review sub-workflow
    - from: review
      to: code_review
      event: begin_review
      description: "Start the review process with code review."

    # Forward path
    - from: code_review
      to: gate_check
      event: code_review_passed
      description: "Code review passed, run gate checks."

    - from: gate_check
      to: acceptance_verification
      event: gate_passed
      description: "Gate checks passed, proceed to acceptance verification."

    - from: acceptance_verification
      to: review_complete
      event: acceptance_confirmed
      description: "Acceptance criteria met — review is complete."

    # Rejection paths — return to implementation
    - from: code_review
      to: implement
      event: code_review_failed
      description: "Code review failed — return to implementation for fixes."
      actions:
        - type: append_log
          params:
            message: "Code review failed — returning to implementation"

    - from: gate_check
      to: implement
      event: gate_failed
      description: "Gate checks failed — return to implementation."
      actions:
        - type: append_log
          params:
            message: "Gate check failed — returning to implementation"

    - from: acceptance_verification
      to: implement
      event: acceptance_rejected
      description: "Acceptance criteria not met — return to implementation."
      actions:
        - type: append_log
          params:
            message: "Acceptance verification failed — returning to implementation"

    # Rework within review
    - from: gate_check
      to: code_review
      event: recheck_code
      description: "Gate check revealed code issues — return to code review."

    - from: acceptance_verification
      to: code_review
      event: restart_review
      description: "Acceptance verification revealed issues — restart review from code review."

    # Exits from review_complete
    - from: review_complete
      to: learn
      event: review_passed
      description: "Review passed, proceed to learning phase."

    - from: review_complete
      to: plan
      event: major_rework
      description: "Review found fundamental issues requiring re-planning."
      actions:
        - type: append_log
          params:
            message: "Major rework required — returning to planning"

# Relationship types applicable in the review stage.
# These relationship types may be used when linking review outcomes to artifacts.
relationship_types:
  - type: addresses
    forward: "addresses"
    inverse: "addressed-by"
    description: "Links a task or review outcome to an issue it resolves."
    from: ["task", "epic"]
    to: ["epic", "milestone"]
    semantic: delivery

  - type: delivers
    forward: "delivers"
    inverse: "delivered-by"
    description: "Links a task or epic to the milestone or epic it delivers."
    from: ["task", "epic"]
    to: ["epic", "milestone"]
    semantic: delivery

  - type: depends-on
    forward: "depends-on"
    inverse: "depended-on-by"
    description: "Explicit dependency between implementation artifacts."
    from: ["task", "epic", "milestone"]
    to: ["task", "epic", "milestone"]
    semantic: dependency

contribution_metadata:
  contributed_by:
    - plugin: "@orqastudio/plugin-agile-review"
      contribution_point: review-process
      version: "0.1.0"
      priority: 10
