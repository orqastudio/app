      gates: [epic-review]
      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin exploring scope and feasibility."
        - from: captured
          to: ready
          event: fast_track
          description: "Skip exploration for well-understood work."
          guards:
            - type: field_check
              description: "Must have a description"
              params:
                field: description
