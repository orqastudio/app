# Resolved implementation stage workflow.
# Hand-written TARGET STATE artifact representing the output of the plugin
# composition pipeline for the implementation stage.
# Source plugin: @orqastudio/plugin-software-kanban v0.1.0

version: "1.0.0-target"
generated: false
description: >
  Resolved implementation stage workflow. Contains all artifact types (epic, task,
  milestone), state machines, gates, task variants, and relationship types contributed
  by @orqastudio/plugin-software-kanban into the implementation stage slot of the
  agile-methodology skeleton.

stage: implement
source_plugin: "@orqastudio/plugin-software-kanban"
fills_slot: implementation-workflow
methodology: agile-methodology

# Sub-workflow states contributed into the implement stage of agile-methodology
contribution_workflow:
  name: software-implementation-contribution
  initial_state: task_assignment
  states:
    task_assignment:
      category: active
      description: "Assign tasks to agents or team members based on the plan."
      on_enter:
        - type: append_log
          params:
            message: "Task assignment started"

    development:
      category: active
      description: "Active development — implementing the assigned tasks."
      on_enter:
        - type: set_field
          params:
            field: development_started_at
            value: "${now}"
        - type: append_log
          params:
            message: "Development started"

    testing:
      category: active
      description: "Testing — verifying implementation against acceptance criteria."
      on_enter:
        - type: append_log
          params:
            message: "Testing started"

    integration:
      category: active
      description: "Integration — merging work, resolving conflicts, verifying combined result."
      on_enter:
        - type: append_log
          params:
            message: "Integration started"

    implementation_complete:
      category: active
      description: "All tasks implemented, tested, and integrated — ready for review."
      on_enter:
        - type: set_field
          params:
            field: implementation_completed_at
            value: "${now}"
        - type: append_log
          params:
            message: "Implementation complete"

  transitions:
    - from: implement
      to: task_assignment
      event: begin_assignment
      description: "Start assigning tasks from the plan."

    - from: task_assignment
      to: development
      event: tasks_assigned
      description: "Tasks assigned, begin development."

    - from: development
      to: testing
      event: development_done
      description: "Development complete, begin testing."

    - from: testing
      to: development
      event: tests_failed
      description: "Tests failed — return to development for fixes."
      actions:
        - type: append_log
          params:
            message: "Tests failed — returning to development"

    - from: testing
      to: integration
      event: tests_passed
      description: "Tests passed, begin integration."

    - from: integration
      to: testing
      event: integration_issues
      description: "Integration issues found — return to testing."
      actions:
        - type: append_log
          params:
            message: "Integration issues — returning to testing"

    - from: integration
      to: implementation_complete
      event: integration_done
      description: "Integration successful, implementation is complete."

    - from: implementation_complete
      to: review
      event: submit_for_review
      description: "Submit completed implementation for review."

    # Rework paths
    - from: implementation_complete
      to: development
      event: rework_needed
      description: "Issues found post-integration — return to development."

    - from: task_assignment
      to: plan
      event: replan
      description: "Task assignment revealed planning gaps — return to planning."

artifact_types:

  milestone:
    id_prefix: "MS"
    id_pattern: "^MS-[a-f0-9]{8}$"
    default_path: ".orqa/implementation/milestones/"
    icon: flag
    stage: implementation
    source_plugin: "@orqastudio/plugin-software-kanban"
    fields:
      required:
        id:
          type: string
          pattern: "^MS-[a-f0-9]{8}$"
        status: { type: string }
      optional:
        title: { type: string }
        description: { type: [string, "null"] }
        gate: { type: [string, array] }
        priority: { type: string }
        target_date: { type: string }
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: [target, type]
    additional_properties: true
    state_machine:
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Milestone has been captured but not yet explored."
        exploring:
          category: planning
          description: "Milestone scope is being explored — target date, epics, acceptance criteria."
          on_enter:
            - type: append_log
              params:
                message: "Milestone exploration started"
        ready:
          category: planning
          description: "Milestone scope is defined and ready for prioritisation."
        prioritised:
          category: planning
          description: "Milestone has been prioritised and is ready for active delivery."
        active:
          category: active
          description: "Milestone delivery is in progress — epics are being worked."
          on_enter:
            - type: set_field
              params:
                field: started_at
                value: "${now}"
            - type: append_log
              params:
                message: "Milestone activated"
        hold:
          category: active
          description: "Milestone is paused, waiting for external input or decision."
        blocked:
          category: active
          description: "Milestone cannot proceed due to unresolved dependencies."
        review:
          category: review
          description: "All epics complete — milestone is awaiting final review."
          on_enter:
            - type: append_log
              params:
                message: "Milestone entered review"
        completed:
          category: completed
          description: "Milestone has been reviewed and accepted as complete."
          on_enter:
            - type: set_field
              params:
                field: completed_at
                value: "${now}"
            - type: append_log
              params:
                message: "Milestone completed"
        surpassed:
          category: terminal
          description: "Milestone was completed but has been superseded."
        archived:
          category: terminal
          description: "Milestone is archived."
      gates: [milestone-review]
      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin exploring scope and target date."
        - from: captured
          to: ready
          event: fast_track
          description: "Skip exploration for well-understood milestones."
          guards:
            - type: field_check
              description: "Must have a description"
              params:
                field: description
                operator: not_empty
        - from: captured
          to: prioritised
          event: prioritise
          description: "Fast-track to prioritised (urgent work)."
        - from: exploring
          to: ready
          event: scope_complete
          description: "Exploration complete, scope is defined."
          guards:
            - type: field_check
              description: "Must have a description"
              params:
                field: description
                operator: not_empty
        - from: exploring
          to: prioritised
          event: prioritise
          description: "Fast-track from exploration to prioritised."
        - from: exploring
          to: hold
          event: pause
          description: "Pause exploration pending external input."
        - from: ready
          to: prioritised
          event: prioritise
        - from: ready
          to: active
          event: start
          description: "Begin delivery directly from ready."
        - from: ready
          to: review
          event: submit_for_review
          description: "Submit directly for review (all epics pre-completed)."
        - from: prioritised
          to: active
          event: start
          description: "Begin milestone delivery."
        - from: prioritised
          to: ready
          event: deprioritise
        - from: active
          to: hold
          event: pause
        - from: active
          to: blocked
          event: block
          guards:
            - type: relationship_check
              description: "Must have at least one depends-on relationship"
              params:
                relationship_type: depends-on
                condition: exists
        - from: active
          to: review
          event: submit_for_review
          description: "All epics complete — submit for review."
          gate: milestone-review
          guards:
            - type: relationship_check
              description: "All fulfilling epics must be completed or archived"
              params:
                relationship_type: fulfils
                condition: all_targets_in_status
                statuses: [completed, surpassed, archived]
        - from: hold
          to: active
          event: resume
        - from: hold
          to: ready
          event: replan
        - from: blocked
          to: active
          event: unblock
          guards:
            - type: relationship_check
              description: "All blocking dependencies must be resolved"
              params:
                relationship_type: depends-on
                condition: all_targets_in_status
                statuses: [completed, surpassed, archived]
        - from: blocked
          to: ready
          event: replan
        - from: review
          to: completed
          event: approve
        - from: review
          to: active
          event: request_changes
          actions:
            - type: append_log
              params:
                message: "Changes requested during milestone review"
        - from: completed
          to: surpassed
          event: surpass
        - from: surpassed
          to: archived
          event: archive
        - from: [captured, exploring, ready, prioritised, hold]
          to: archived
          event: archive
    state_categories:
      planning: [captured, exploring, ready, prioritised]
      active: [active, hold, blocked]
      review: [review]
      completed: [completed]
      terminal: [surpassed, archived]
    gates:
      milestone-review:
        pattern: structured_review
        description: "Milestone completion review — AI pre-check then human review."
        phases:
          gather:
            fields: [description, target_date, priority, relationships]
            pre_checks:
              - type: relationship_check
                description: "All fulfilling epics must be completed"
                params:
                  relationship_type: fulfils
                  condition: all_targets_in_status
                  statuses: [completed, surpassed, archived]
              - type: field_check
                description: "Description must exist"
                params:
                  field: description
                  operator: not_empty
            summary_template: >
              Milestone: ${title}
              Target date: ${target_date}
              Epics fulfilled: ${relationship_count:fulfils}
              Status: All epics in terminal state
          present:
            sections:
              - title: "Milestone Overview"
                content_field: description
              - title: "Fulfilled Epics"
                content_template: "Epic relationships: ${relationships:fulfils}"
          collect:
            verdicts:
              - key: approve
                label: "Approve — Milestone Complete"
                transitions_to: completed
              - key: request_changes
                label: "Request Changes"
                transitions_to: active
            require_rationale: true
          learn:
            on_fail:
              create_lesson: true
              track_recurrence: true
            on_pass:
              track_cycle_time: true

  epic:
    id_prefix: "EPIC"
    id_pattern: "^EPIC-[a-f0-9]{8}$"
    default_path: ".orqa/implementation/epics/"
    icon: layers
    stage: implementation
    source_plugin: "@orqastudio/plugin-software-kanban"
    fields:
      required:
        id:
          type: string
          pattern: "^EPIC-[a-f0-9]{8}$"
        status: { type: string }
      optional:
        title: { type: string }
