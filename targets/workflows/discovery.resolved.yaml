# Resolved discovery stage workflow.
# Hand-written TARGET STATE artifact representing the output of the plugin
# composition pipeline for the discovery stage.
# Source plugin: @orqastudio/plugin-agile-discovery v0.1.0

version: "1.0.0-target"
generated: false
description: >
  Resolved discovery stage workflow. Contains all artifact types, state machines,
  and relationship types contributed by @orqastudio/plugin-agile-discovery into
  the discovery stage slot of the agile-methodology skeleton.

stage: discover
source_plugin: "@orqastudio/plugin-agile-discovery"
fills_slot: discovery-artifacts
methodology: agile-methodology

# Sub-workflow states contributed into the discover stage of agile-methodology
contribution_workflow:
  name: discovery-contribution
  initial_state: ideation
  states:
    ideation:
      category: planning
      description: "Capture and explore high-level product ideas."
      on_enter:
        - type: append_log
          params:
            message: "Discovery ideation started"

    investigation:
      category: planning
      description: "Conduct research investigations to validate ideas."
      on_enter:
        - type: append_log
          params:
            message: "Discovery investigation started"

    strategic_decision:
      category: planning
      description: "Make strategic decisions based on research findings."
      on_enter:
        - type: append_log
          params:
            message: "Strategic decision-making started"

    discovery_complete:
      category: planning
      description: "Discovery stage complete — ready to hand off to planning."
      on_enter:
        - type: append_log
          params:
            message: "Discovery complete"

  transitions:
    - from: discover
      to: ideation
      event: begin_ideation
      description: "Start capturing and exploring ideas."

    - from: ideation
      to: investigation
      event: ideas_captured
      description: "Ideas captured, begin research investigation."

    - from: investigation
      to: ideation
      event: new_ideas
      description: "Research surfaced new ideas — return to ideation."

    - from: investigation
      to: strategic_decision
      event: research_complete
      description: "Research complete, make strategic decisions."

    - from: strategic_decision
      to: investigation
      event: needs_research
      description: "Decision requires more research."

    - from: strategic_decision
      to: discovery_complete
      event: decisions_made
      description: "Strategic decisions made, discovery is complete."

    - from: discovery_complete
      to: plan
      event: scope_defined
      description: "Hand off to planning stage."

    # Fast-track paths
    - from: ideation
      to: strategic_decision
      event: fast_track
      description: "Skip investigation for well-understood ideas."

    - from: ideation
      to: discovery_complete
      event: skip_to_complete
      description: "Simple discovery — ideas are clear, no investigation needed."

