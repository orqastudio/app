# Relationship types relevant to this stage (from schema.composed.json)
relationship_types:
  upholds:
    forward: upholds
    inverse: upheld-by
    from: [pillar]
    to: [vision]
    semantic: foundation

  grounded:
    forward: grounded
    inverse: grounded-by
    from: [discovery-idea]
    to: [pillar]
    semantic: foundation

  benefits:
    forward: benefits
    inverse: benefited-by
    from: [discovery-idea]
    to: [persona]
    semantic: foundation
    constraints: { required: true, minCount: 1 }

  crystallises:
    forward: crystallises
    inverse: crystallised-by
    from: [discovery-idea]
    to: [discovery-decision]
    semantic: lineage

  spawns:
    forward: spawns
    inverse: spawned-by
    from: [discovery-idea]
    to: [discovery-research]
    semantic: lineage

  drives:
    forward: drives
    inverse: driven-by
    from: [discovery-decision, vision]
    to: [pillar]
    semantic: governance

  informs:
    forward: informs
    inverse: informed-by
    from: [discovery-research, discovery-decision]
    to: [discovery-decision, discovery-research]
    semantic: knowledge-flow

  evolves-to:
    forward: evolves-to
    inverse: evolved-from
    from: [discovery-idea, discovery-research]
    to: [discovery-research, discovery-decision]
    semantic: lineage

  pivots:
    forward: pivots
    inverse: pivoted-by
    from: [vision]
    to: [pivot]
    semantic: foundation

  revises:
    forward: revises
    inverse: revised-by
    from: [pivot]
    to: [vision, persona, pillar]
    semantic: foundation
