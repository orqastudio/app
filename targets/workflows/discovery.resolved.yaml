  vision:
    id_prefix: "VISION"
    id_pattern: "^VISION-[a-f0-9]{8}$"
    default_path: ".orqa/discovery/vision/"
    icon: eye
    influence: high
    stage: discovery
    source_plugin: "@orqastudio/plugin-agile-discovery"
    fields:
      required:
        id:
          type: string
          pattern: "^VISION-[a-f0-9]{8}$"
      optional:
        title: { type: string }
        description: { type: [string, "null"] }
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: [target, type]
    additional_properties: true
    state_machine:
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Vision has been captured but not yet activated."
        active:
          category: active
          description: "Vision is the active guiding direction."
          on_enter:
            - type: set_field
              params:
                field: activated_at
                value: "${now}"
            - type: append_log
              params:
                message: "Vision activated"
        review:
          category: review
          description: "Vision is being reviewed for continued relevance."
          on_enter:
            - type: append_log
              params:
                message: "Vision entered review"
        surpassed:
          category: terminal
          description: "Vision has been superseded by a newer direction."
        archived:
          category: terminal
          description: "Vision is archived."
      transitions:
        - from: captured
          to: active
          event: activate
          description: "Activate this vision as the guiding direction."
        - from: active
          to: review
          event: submit_for_review
          description: "Trigger periodic relevance review."
        - from: active
          to: archived
          event: archive
          description: "Archive an active vision directly."
        - from: review
          to: active
          event: reaffirm
          description: "Vision is still relevant — return to active."
        - from: review
          to: surpassed
          event: surpass
          description: "Vision is no longer relevant — mark as superseded."
        - from: surpassed
          to: archived
          event: archive
        - from: captured
          to: archived
          event: archive
          description: "Archive a captured vision that was never activated."
    state_categories:
      planning: [captured]
      active: [active]
      review: [review]
      completed: []
      terminal: [surpassed, archived]

