# Resolved documentation stage workflow.
# Hand-written TARGET STATE artifact representing the output of the plugin
# composition pipeline for the documentation stage.
# Source plugins: @orqastudio/plugin-agile-documentation v0.1.0 (contribution workflow)
#                 @orqastudio/plugin-core-framework v0.1.0 (doc and knowledge artifact types)

version: "1.0.0-target"
generated: false
description: >
  Resolved documentation stage workflow. Contains the contribution workflow from
  @orqastudio/plugin-agile-documentation and the doc artifact type from
  @orqastudio/plugin-core-framework. Knowledge (KNOW-*) artifacts are managed
  by core-framework but live in documentation/knowledge/ subdirectories.

stage: document
source_plugin: "@orqastudio/plugin-agile-documentation"
fills_slot: documentation-standards
methodology: agile-methodology

# Sub-workflow states contributed into the document stage of agile-methodology
contribution_workflow:
  name: agile-documentation-contribution
  initial_state: draft_docs
  states:
    draft_docs:
      category: planning
      description: "Draft documentation — capture decisions, architecture, requirements as structured artifacts."
      on_enter:
        - type: append_log
          params:
            message: "Documentation drafting started"

    review_docs:
      category: review
      description: "Review documentation — verify accuracy, completeness, and alignment with decisions."
      on_enter:
        - type: append_log
          params:
            message: "Documentation review started"

    publish_docs:
      category: active
      description: "Publish documentation — finalize and make available to the team."
      on_enter:
        - type: append_log
          params:
            message: "Documentation published"

  transitions:
    - from: document
      to: draft_docs
      event: begin_documentation
      description: "Start documenting decisions and architecture."

    - from: draft_docs
      to: review_docs
      event: drafts_complete
      description: "Drafts complete, begin documentation review."

    - from: review_docs
      to: draft_docs
      event: revisions_needed
      description: "Review found issues — revise documentation."

    - from: review_docs
      to: publish_docs
      event: docs_approved
      description: "Documentation approved, publish."

    - from: publish_docs
      to: implement
      event: documentation_complete
      description: "Documentation published, proceed to implementation."

    - from: draft_docs
      to: implement
      event: skip_review
      description: "Skip documentation review for simple changes."

artifact_types:

  doc:
    id_prefix: "DOC"
    id_pattern: "^DOC-[a-f0-9]{8}$"
    default_path: ".orqa/documentation/"
    icon: file-text
    stage: documentation
    source_plugin: "@orqastudio/plugin-core-framework"
    fields:
      required:
        id:
          type: string
          pattern: "^DOC-[a-f0-9]{8}$"
      optional:
        title: { type: string }
        description: { type: [string, "null"] }
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: [target, type]
    additional_properties: true
    state_machine:
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Document has been captured but not yet started."
        exploring:
          category: planning
          description: "Document scope is being explored — outline, audience, coverage."
          on_enter:
            - type: append_log
              params:
                message: "Document exploration started"
        active:
          category: active
          description: "Document is actively being authored."
          on_enter:
            - type: set_field
              params:
                field: started_at
                value: "${now}"
            - type: append_log
              params:
                message: "Document authoring activated"
        hold:
          category: active
          description: "Document authoring is paused."
        review:
          category: review
          description: "Document is being reviewed for accuracy and completeness."
          on_enter:
            - type: append_log
              params:
                message: "Document entered review"
        completed:
          category: completed
          description: "Document has been reviewed and published."
          on_enter:
            - type: set_field
              params:
                field: completed_at
                value: "${now}"
            - type: append_log
              params:
                message: "Document completed"
        surpassed:
          category: terminal
          description: "Document has been superseded by a newer version."
        archived:
          category: terminal
          description: "Document is archived."
      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin defining document scope."
        - from: captured
          to: active
          event: start
          description: "Fast-track to active authoring."
        - from: exploring
          to: active
          event: start
          description: "Begin authoring."
        - from: exploring
          to: hold
          event: pause
          description: "Pause exploration pending input."
        - from: active
          to: review
          event: submit_for_review
          description: "Submit document for review."
        - from: active
          to: hold
          event: pause
          description: "Pause authoring."
        - from: active
          to: archived
          event: archive
          description: "Archive document directly."
        - from: hold
          to: active
          event: resume
          description: "Resume authoring."
        - from: hold
          to: exploring
          event: rescope
          description: "Return to exploration for re-scoping."
        - from: review
          to: active
          event: request_changes
          description: "Further work needed."
          actions:
            - type: append_log
              params:
                message: "Changes requested during document review"
        - from: review
          to: completed
          event: approve
          description: "Document accepted and published."
        - from: completed
          to: surpassed
          event: surpass
        - from: completed
          to: archived
          event: archive
        - from: surpassed
          to: archived
          event: archive
        - from: [captured, exploring, hold]
          to: archived
          event: archive
          description: "Archive from non-active states."
    state_categories:
      planning: [captured, exploring]
      active: [active, hold]
      review: [review]
      completed: [completed]
      terminal: [surpassed, archived]

  knowledge:
    id_prefix: "KNOW"
    id_pattern: "^KNOW-[a-f0-9]{8}$"
    default_path: ".orqa/documentation/knowledge/"
    icon: zap
    stage: documentation
    source_plugin: "@orqastudio/plugin-core-framework"
    note: "Knowledge lives WITH documentation — agent-consumable chunks in <category>/knowledge/ subdirectories. Size constraint: 500-2000 tokens (enforced at write time by LSP)."
    fields:
      required:
        id:
          type: string
          pattern: "^KNOW-[a-f0-9]{8}$"
      optional:
        title: { type: string }
        description: { type: [string, "null"] }
        thinking-mode: { type: string }
        priority-rules:
          type: array
          items: { type: string }
        relationships:
          type: array
          items:
            type: object
            properties:
              target: { type: string }
              type: { type: string }
              rationale: { type: string }
            required: [target, type]
    additional_properties: true
    size_constraint:
      min_tokens: 500
      max_tokens: 2000
      enforcement: write_time_lsp
    state_machine:
      initial_state: captured
      states:
        captured:
          category: planning
          description: "Knowledge has been captured but not yet explored."
        exploring:
          category: planning
          description: "Knowledge is being explored — scope, accuracy, relevance."
          on_enter:
            - type: append_log
              params:
                message: "Knowledge exploration started"
        active:
          category: active
          description: "Knowledge is actively being used in agent prompts."
          on_enter:
            - type: set_field
              params:
                field: activated_at
                value: "${now}"
            - type: append_log
              params:
                message: "Knowledge activated"
        hold:
          category: active
          description: "Knowledge is paused — accuracy or relevance under question."
        review:
          category: review
          description: "Knowledge is being reviewed for continued accuracy."
          on_enter:
            - type: append_log
              params:
                message: "Knowledge entered review"
        completed:
          category: completed
          description: "Knowledge lifecycle is complete — content has been fully documented."
          on_enter:
            - type: append_log
              params:
                message: "Knowledge completed"
        surpassed:
          category: terminal
          description: "Knowledge has been superseded by newer information."
        archived:
          category: terminal
          description: "Knowledge is archived."
      transitions:
        - from: captured
          to: exploring
          event: explore
          description: "Begin exploring scope and accuracy."
        - from: captured
          to: active
          event: activate
          description: "Fast-track to active use."
        - from: exploring
          to: active
          event: activate
          description: "Begin active use in prompts."
        - from: exploring
          to: hold
          event: pause
          description: "Pause exploration pending verification."
        - from: active
          to: review
          event: submit_for_review
          description: "Trigger periodic accuracy review."
        - from: active
          to: hold
          event: pause
          description: "Pause active use."
        - from: active
          to: archived
          event: archive
          description: "Archive knowledge directly."
        - from: hold
          to: active
          event: resume
          description: "Resume active use."
        - from: hold
          to: exploring
          event: rescope
          description: "Return to exploration for re-scoping."
        - from: review
          to: active
          event: reaffirm
          description: "Knowledge is still accurate — return to active."
        - from: review
          to: completed
          event: retire
          description: "Knowledge is complete — no further updates needed."
        - from: completed
          to: surpassed
          event: surpass
        - from: completed
          to: archived
          event: archive
        - from: surpassed
          to: archived
          event: archive
        - from: [captured, exploring, hold]
          to: archived
          event: archive
          description: "Archive from non-active states."
    state_categories:
      planning: [captured, exploring]
      active: [active, hold]
      review: [review]
      completed: [completed]
      terminal: [surpassed, archived]

# Relationship types relevant to this stage
relationship_types:
  documents:
    forward: documents
    inverse: documented-by
    from: [doc]
    to: [epic, decision, discovery-decision, rule, milestone]
    semantic: knowledge-flow

  synchronised-with:
    forward: synchronised-with
    inverse: synchronised-with
    from: [knowledge, doc]
    to: [knowledge, doc]
    semantic: synchronisation
    symmetric: true

contribution_metadata:
  - plugin: "@orqastudio/plugin-agile-documentation"
    version: "0.1.0"
    contributes:
      - contribution_workflow: agile-documentation-contribution

  - plugin: "@orqastudio/plugin-core-framework"
    version: "0.1.0"
    contributes:
      - artifact_types: [doc, knowledge]
      - relationship_types: [documents, synchronised-with]
