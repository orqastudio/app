name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: orqa-lsp-server.exe
            asset: orqa-lsp-server-windows-x86_64.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: orqa-lsp-server
            asset: orqa-lsp-server-linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: orqa-lsp-server
            asset: orqa-lsp-server-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Validate version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CRATE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG" != "$CRATE_VERSION" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CRATE_VERSION}"
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --bin orqa-lsp-server --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
