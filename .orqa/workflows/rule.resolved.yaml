name: rule
version: 0.1.0
artifact_type: rule
plugin: "@orqastudio/plugin-core-framework"
description: >
  Rule lifecycle state machine. Rules are governance constraints enforced within the project. The workflow tracks
  capture, exploration, active enforcement, potential inactivation, review, and completion. Rules have a unique
  "inactive" state for demoted rules being monitored before removal.
initial_state: captured
states:
  captured:
    category: planning
    description: Rule has been captured but not yet explored.
  exploring:
    category: planning
    description: Rule is being explored — scope, enforcement mechanism, rationale.
    on_enter:
      - type: append_log
        params:
          message: Rule exploration started
  active:
    category: active
    description: Rule is actively enforced.
    on_enter:
      - type: set_field
        params:
          field: activated_at
          value: ${now}
      - type: append_log
        params:
          message: Rule activated
  inactive:
    category: active
    description: Rule has been demoted — monitoring stability before removal.
    on_enter:
      - type: set_field
        params:
          field: demoted_date
          value: ${now}
      - type: append_log
        params:
          message: Rule demoted to inactive
  hold:
    category: active
    description: Rule enforcement is paused pending discussion.
  review:
    category: review
    description: Rule is being reviewed for continued relevance.
    on_enter:
      - type: append_log
        params:
          message: Rule entered review
  completed:
    category: completed
    description: Rule lifecycle is complete — enforcement superseded or no longer needed.
    on_enter:
      - type: append_log
        params:
          message: Rule completed
  surpassed:
    category: terminal
    description: Rule has been superseded by a newer rule or enforcement mechanism.
  archived:
    category: terminal
    description: Rule is archived.
transitions:
  - from: captured
    to: exploring
    event: explore
    description: Begin exploring rule scope and enforcement.
  - from: captured
    to: active
    event: activate
    description: Fast-track to active enforcement.
  - from: exploring
