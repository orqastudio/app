name: doc
version: 0.1.0
artifact_type: doc
plugin: "@orqastudio/plugin-agile-governance"
description: >
  Document lifecycle state machine. Documents capture technical documentation, guides, and reference material. The
  workflow tracks capture, exploration, active authoring, review, and completion.
initial_state: captured
states:
  captured:
    category: planning
    description: Document has been captured but not yet started.
  exploring:
    category: planning
    description: Document scope is being explored — outline, audience, coverage.
    on_enter:
      - type: append_log
        params:
          message: Document exploration started
  active:
    category: active
    description: Document is actively being authored.
    on_enter:
      - type: set_field
        params:
          field: started_at
          value: ${now}
      - type: append_log
        params:
          message: Document authoring activated
  hold:
    category: active
    description: Document authoring is paused.
  review:
    category: review
    description: Document is being reviewed for accuracy and completeness.
    on_enter:
      - type: append_log
        params:
          message: Document entered review
  completed:
    category: completed
    description: Document has been reviewed and published.
    on_enter:
      - type: set_field
        params:
          field: completed_at
          value: ${now}
      - type: append_log
        params:
          message: Document completed
  surpassed:
    category: terminal
    description: Document has been superseded by a newer version.
  archived:
    category: terminal
    description: Document is archived.
transitions:
  - from: captured
    to: exploring
    event: explore
    description: Begin defining document scope.
  - from: captured
    to: active
    event: start
    description: Fast-track to active authoring.
  - from: exploring
    to: active
    event: start
    description: Begin authoring.
  - from: exploring
    to: hold
    event: pause
