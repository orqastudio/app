name: planning-decision
version: "0.1.0"
artifact_type: planning-decision
plugin: "@orqastudio/plugin-agile-planning"
description: >
  Planning decision lifecycle state machine. Planning decisions are concrete
  architectural and implementation decisions made during the planning stage.
  They are tactical choices about how to build something, distinct from
  discovery decisions which are strategic choices about what to build.

initial_state: proposed

states:
  proposed:
    category: planning
    description: "Decision has been proposed but not yet reviewed."

  reviewing:
    category: active
    description: "Decision is being reviewed — options, trade-offs, constraints analysed."
    on_enter:
      - type: set_field
        params:
          field: started_at
          value: "${now}"
      - type: append_log
        params:
          message: "Planning decision review started"

  hold:
    category: active
    description: "Decision is paused, waiting for input or research results."

  resolved:
    category: completed
    description: "Decision has been resolved — choice made and recorded."
    on_enter:
      - type: set_field
        params:
          field: resolved_at
          value: "${now}"
      - type: append_log
        params:
          message: "Planning decision resolved"

  deferred:
    category: terminal
    description: "Decision has been deferred — not enough information to decide now."
    on_enter:
      - type: set_field
        params:
          field: deferred_at
          value: "${now}"
      - type: append_log
        params:
          message: "Planning decision deferred"

  archived:
    category: terminal
    description: "Decision is archived."

transitions:
  # Review phase
  - from: proposed
    to: reviewing
    event: review
    description: "Begin reviewing the decision."

  - from: proposed
    to: resolved
    event: resolve
    description: "Fast-track resolve (clear-cut decision)."

  # Resolution
  - from: reviewing
    to: resolved
    event: resolve
    description: "Resolve the decision."

  - from: reviewing
    to: deferred
    event: defer
    description: "Defer the decision — insufficient information."

  - from: reviewing
    to: hold
    event: pause
    description: "Pause review pending input."

  - from: reviewing
    to: proposed
    event: rework
    description: "Return to proposed for reformulation."

  # Hold transitions
  - from: hold
    to: reviewing
    event: resume
    description: "Resume review."

  - from: hold
    to: archived
    event: archive
    description: "Archive from hold."

  # Deferred can be reopened
  - from: deferred
    to: proposed
    event: reopen
    description: "Reopen a deferred decision with new information."

  # Terminal transitions
  - from: resolved
    to: archived
    event: archive
    description: "Archive a resolved decision."

  - from: deferred
    to: archived
    event: archive

  - from: [proposed, hold]
    to: archived
    event: archive
    description: "Archive from non-active states."

migration:
  proposed: proposed
  reviewing: reviewing
  hold: hold
  resolved: resolved
  deferred: deferred
  archived: archived
