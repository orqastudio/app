transitions:
  - from: discover
    to: plan
    event: scope_defined
    description: Discovery complete, move to planning.
    guards:
      - type: field_check
        description: Must have a description
        params:
          field: description
          operator: not_empty
  - from: plan
    to: document
    event: plan_approved
    description: Plan approved, document decisions.
  - from: plan
    to: implement
    event: start_implementation
    description: Skip documentation, go straight to implementation.
  - from: document
    to: implement
    event: documentation_complete
    description: Documentation done, begin implementation.
  - from: implement
    to: review
    event: submit_for_review
    description: Implementation complete, submit for review.
    gate: delivery-review
  - from: review
    to: learn
    event: review_passed
    description: Review passed, enter learning phase.
  - from: review
    to: implement
    event: review_failed
    description: Review failed, return to implementation.
    actions:
      - type: append_log
        params:
          message: Review failed — returning to implementation
  - from: learn
    to: done
    event: retrospective_complete
    description: Retrospective done, delivery complete.
  - from: document
    to: plan
    event: replan
    description: Documentation revealed planning gaps.
  - from: implement
    to: plan
    event: replan
    description: Implementation revealed planning gaps.
  - from: review
    to: plan
    event: major_rework
    description: Review found fundamental issues requiring re-planning.
  - from: plan
    to: scope_analysis
    event: begin_scoping
    description: Start scoping the delivery — decompose into tasks.
  - from: scope_analysis
    to: estimation
    event: scoping_complete
    description: Scope is defined, begin estimation.
    guards:
      - type: field_check
        description: Must have a description before estimating
        params:
          field: description
          operator: not_empty
  - from: estimation
    to: prioritisation
    event: estimation_complete
    description: Estimation done, begin prioritisation.
  - from: prioritisation
    to: plan_finalised
    event: priorities_set
    description: Priorities established, finalise the plan.
  - from: plan_finalised
    to: implement
    event: start_implementation
    description: Plan approved, begin implementation.
  - from: plan_finalised
    to: document
    event: plan_approved
    description: Plan approved, document decisions before implementing.
  - from: estimation
    to: scope_analysis
    event: rescope
    description: Estimation revealed scope issues — return to scoping.
  - from: prioritisation
    to: estimation
    event: re_estimate
    description: Priority changes require re-estimation.
  - from: plan_finalised
    to: scope_analysis
    event: replan
    description: Fundamental issues found — restart planning from scoping.
  - from: implement
    to: task_assignment
    event: begin_assignment
    description: Start assigning tasks from the plan.
  - from: task_assignment
    to: development
    event: tasks_assigned
    description: Tasks assigned, begin development.
  - from: development
    to: testing
    event: development_done
    description: Development complete, begin testing.
  - from: testing
    to: development
    event: tests_failed
    description: Tests failed — return to development for fixes.
    actions:
      - type: append_log
        params:
          message: Tests failed — returning to development
  - from: testing
    to: integration
    event: tests_passed
    description: Tests passed, begin integration.
  - from: integration
    to: testing
    event: integration_issues
    description: Integration issues found — return to testing.
    actions:
      - type: append_log
        params:
          message: Integration issues — returning to testing
  - from: integration
    to: implementation_complete
    event: integration_done
    description: Integration successful, implementation is complete.
  - from: implementation_complete
    to: review
    event: submit_for_review
    description: Submit completed implementation for review.
  - from: implementation_complete
    to: development
    event: rework_needed
    description: Issues found post-integration — return to development.
  - from: task_assignment
    to: plan
    event: replan
    description: Task assignment revealed planning gaps — return to planning.
  - from: review
    to: code_review
    event: begin_review
    description: Start the review process with code review.
  - from: code_review
    to: gate_check
    event: code_review_passed
    description: Code review passed, run gate checks.
  - from: code_review
    to: implement
    event: code_review_failed
    description: Code review failed — return to implementation for fixes.
    actions:
      - type: append_log
        params:
          message: Code review failed — returning to implementation
  - from: gate_check
    to: acceptance_verification
    event: gate_passed
    description: Gate checks passed, proceed to acceptance verification.
  - from: gate_check
    to: implement
    event: gate_failed
    description: Gate checks failed — return to implementation.
    actions:
      - type: append_log
        params:
          message: Gate check failed — returning to implementation
  - from: acceptance_verification
    to: review_complete
    event: acceptance_confirmed
    description: Acceptance criteria met — review is complete.
  - from: acceptance_verification
    to: implement
    event: acceptance_rejected
    description: Acceptance criteria not met — return to implementation.
    actions:
      - type: append_log
        params:
          message: Acceptance verification failed — returning to implementation
  - from: review_complete
    to: learn
    event: review_passed
    description: Review passed, proceed to learning phase.
  - from: review_complete
    to: plan
    event: major_rework
    description: Review found fundamental issues requiring re-planning.
    actions:
      - type: append_log
        params:
          message: Major rework required — returning to planning
  - from: gate_check
    to: code_review
    event: recheck_code
    description: Gate check revealed code issues — return to code review.
  - from: acceptance_verification
    to: code_review
    event: restart_review
    description: Acceptance verification revealed issues — restart review from code review.
gates:
  delivery-review:
    pattern: structured_review
    description: Delivery review gate — AI pre-check followed by human review.
    phases:
      gather:
        fields:
          - description
          - priority
          - relationships
        pre_checks:
          - type: relationship_check
            description: Must have delivered tasks
            params:
              relationship_type: delivers
              condition: exists
      present:
        sections:
          - title: Delivery Summary
            content_field: description
          - title: Tasks Delivered
            content_template: "Tasks: ${relationships:delivers}"
      collect:
        verdicts:
          - key: approve
            label: Approve
            transitions_to: learn
          - key: request_changes
            label: Request Changes
            transitions_to: implement
          - key: major_rework
            label: Major Rework Required
            transitions_to: plan
        require_rationale: true
      learn:
        on_fail:
          create_lesson: true
          track_recurrence: true
        on_pass:
          track_cycle_time: true
