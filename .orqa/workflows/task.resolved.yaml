name: task
version: 0.1.0
artifact_type: task
plugin: "@orqastudio/plugin-software-kanban"
description: >
  Task lifecycle state machine. Covers the full journey from capture through planning, active work, review, and
  completion. Supports quickfix, security, docs-only, and hotfix variants for ad-hoc patterns.
initial_state: captured
states:
  captured:
    category: planning
    description: Newly created task, not yet triaged or prioritised.
  ready:
    category: planning
    description: Task has been triaged and is ready for prioritisation.
  prioritised:
    category: planning
    description: Task has been prioritised and is ready to be picked up.
  active:
    category: active
    description: Work is in progress on this task.
    on_enter:
      - type: set_field
        params:
          field: started_at
          value: ${now}
      - type: append_log
        params:
          message: Task activated by ${actor}
  hold:
    category: active
    description: Work is paused, waiting for external input or decision.
  blocked:
    category: active
    description: Work cannot proceed due to unresolved dependencies.
  review:
    category: review
    description: Work is complete and awaiting review.
    on_enter:
      - type: append_log
        params:
          message: Task entered review
  completed:
    category: completed
    description: Task has been reviewed and accepted.
    on_enter:
      - type: set_field
        params:
          field: completed_at
          value: ${now}
      - type: append_log
        params:
          message: Task completed
  surpassed:
    category: terminal
    description: Task was completed but has been superseded by newer work.
  archived:
    category: terminal
    description: Task is archived and no longer active.
transitions:
  - from: captured
    to: ready
    event: triage
    description: Task has been triaged and is ready for planning.
    guards:
      - type: field_check
        description: Task must have a description
        params:
          field: description
          operator: not_empty
  - from: captured
    to: prioritised
    event: prioritise
    description: Fast-track directly to prioritised (skip ready).
  - from: ready
    to: prioritised
    event: prioritise
  - from:
      - ready
      - prioritised
    to: active
    event: start
    description: Begin work on this task.
    actions:
      - type: notify
        params:
          channel: ui
          message: Task ${id} has been started
  - from: prioritised
    to: ready
    event: deprioritise
    description: Return to ready pool.
  - from: active
    to: hold
    event: pause
    description: Pause work, waiting for external input.
  - from: active
    to: blocked
    event: block
    description: Mark as blocked by dependencies.
    guards:
      - type: relationship_check
        description: Must have at least one depends-on relationship
        params:
          relationship_type: depends-on
          condition: exists
  - from: active
    to: review
    event: submit_for_review
    description: Submit completed work for review.
    gate: task-review
  - from: hold
    to: active
    event: resume
    description: Resume paused work.
  - from: hold
    to: ready
    event: replan
    description: Return to planning for re-scoping.
  - from: blocked
    to: active
    event: unblock
    description: Dependencies resolved, resume work.
    guards:
      - type: relationship_check
        description: All blocking dependencies must be resolved
        params:
          relationship_type: depends-on
          condition: all_targets_in_status
          statuses:
            - completed
            - surpassed
            - archived
  - from: blocked
    to: ready
    event: replan
    description: Return to planning for re-scoping.
  - from: review
    to: completed
    event: approve
    description: Review passed — task is complete.
  - from: review
    to: active
    event: request_changes
    description: Review found issues — return to active work.
    actions:
      - type: append_log
        params:
          message: Changes requested during review
  - from: completed
    to: surpassed
    event: surpass
    description: Mark as superseded by newer work.
  - from: surpassed
    to: archived
    event: archive
  - from:
      - captured
      - ready
      - prioritised
      - hold
    to: archived
    event: archive
    description: Archive from any non-active state.
gates:
  task-review:
    pattern: simple_approval
    description: Standard task completion review.
    phases:
      gather:
        fields:
          - description
          - priority
          - relationships
        pre_checks:
          - type: field_check
            description: Task must have a description
            params:
              field: description
              operator: not_empty
          - type: relationship_check
            description: Task should deliver to an epic
            params:
              relationship_type: delivers
              condition: exists
      present:
        sections:
          - title: Task Summary
            content_field: description
          - title: Deliverables
            content_template: "Relationships: ${relationships}"
      collect:
        verdicts:
          - key: approve
            label: Approve
            transitions_to: completed
          - key: request_changes
            label: Request Changes
            transitions_to: active
        require_rationale: false
      learn:
        on_fail:
          create_lesson: true
          track_recurrence: true
        on_pass:
          track_cycle_time: true
variants:
  quickfix:
    description: For small bug fixes and UX tweaks — skip planning, automated review only.
    skip_states:
      - ready
      - prioritised
    skip_gates:
      - task-review
    override_transitions:
      - from: captured
        to: active
        event: start
        description: Jump directly to active work.
      - from: active
        to: completed
        event: complete
        description: Complete without human review.
        guards:
          - type: field_check
            description: Must be marked as quickfix
            params:
              field: labels
              operator: in
              value:
                - quickfix
                - bugfix
                - typo
  security:
    description: For security fixes — skip planning, mandatory human review.
    skip_states:
      - ready
      - prioritised
    override_transitions:
      - from: captured
        to: active
        event: start
        description: Jump directly to active work.
  docs-only:
    description: For documentation-only changes — skip planning and review entirely.
    skip_states:
      - ready
      - prioritised
    skip_gates:
      - task-review
    override_transitions:
      - from: captured
        to: active
        event: start
        description: Jump directly to active work.
      - from: active
        to: completed
        event: complete
        description: Complete without human review — docs only.
  hotfix:
    description: For hotfixes — skip planning, expedited but reviewed.
    skip_states:
      - ready
      - prioritised
    override_transitions:
      - from: captured
        to: active
        event: start
        description: Jump directly to active work.
selection_rules:
  - variant: quickfix
    priority: 10
    conditions:
      - type: field_check
        params:
          field: labels
          operator: in
          value:
            - quickfix
            - bugfix
            - typo
  - variant: security
    priority: 20
    conditions:
      - type: field_check
        params:
          field: labels
          operator: in
          value:
            - security
  - variant: docs-only
    priority: 30
    conditions:
      - type: field_check
        params:
          field: labels
          operator: in
          value:
            - docs-only
            - documentation
  - variant: hotfix
    priority: 40
    conditions:
      - type: field_check
        params:
          field: labels
          operator: in
          value:
            - hotfix
            - emergency
migration:
  captured: captured
  exploring: ready
  ready: ready
  prioritised: prioritised
  active: active
  hold: hold
  blocked: blocked
  review: review
  completed: completed
  surpassed: surpassed
  archived: archived
