name: software-planning-contribution
version: "0.1.0"
artifact_type: epic
plugin: "@orqastudio/plugin-software-project"
description: >
  Software planning methodology contribution to the delivery workflow skeleton.
  Adds states and transitions for scoping, task decomposition, estimation, and
  prioritisation within a software development project.

contributes_to:
  workflow: delivery
  point: planning-methodology
  priority: 10

initial_state: scope_analysis

states:
  scope_analysis:
    category: planning
    description: "Analyse scope — break down the epic into deliverable tasks, identify dependencies."
    on_enter:
      - type: append_log
        params:
          message: "Scope analysis started"

  estimation:
    category: planning
    description: "Estimate effort — size tasks, identify risks, set rough timelines."
    on_enter:
      - type: append_log
        params:
          message: "Estimation started"

  prioritisation:
    category: planning
    description: "Prioritise tasks — order by value, risk, and dependency constraints."
    on_enter:
      - type: append_log
        params:
          message: "Prioritisation started"

  plan_finalised:
    category: planning
    description: "Plan is finalised — tasks are scoped, estimated, and ordered."
    on_enter:
      - type: set_field
        params:
          field: plan_finalised_at
          value: "${now}"
      - type: append_log
        params:
          message: "Plan finalised"

transitions:
  # Planning sub-workflow within the plan stage
  - from: plan
    to: scope_analysis
    event: begin_scoping
    description: "Start scoping the delivery — decompose into tasks."

  - from: scope_analysis
    to: estimation
    event: scoping_complete
    description: "Scope is defined, begin estimation."
    guards:
      - type: field_check
        description: "Must have a description before estimating"
        params:
          field: description
          operator: not_empty

  - from: estimation
    to: prioritisation
    event: estimation_complete
    description: "Estimation done, begin prioritisation."

  - from: prioritisation
    to: plan_finalised
    event: priorities_set
    description: "Priorities established, finalise the plan."

  - from: plan_finalised
    to: implement
    event: start_implementation
    description: "Plan approved, begin implementation."

  - from: plan_finalised
    to: document
    event: plan_approved
    description: "Plan approved, document decisions before implementing."

  # Rework paths
  - from: estimation
    to: scope_analysis
    event: rescope
    description: "Estimation revealed scope issues — return to scoping."

  - from: prioritisation
    to: estimation
    event: re_estimate
    description: "Priority changes require re-estimation."

  - from: plan_finalised
    to: scope_analysis
    event: replan
    description: "Fundamental issues found — restart planning from scoping."
