name: agile-methodology
version: "0.1.0"
artifact_type: epic
plugin: "@orqastudio/plugin-agile-methodology"
description: >
  Core delivery workflow skeleton with contribution points. This is the
  workflow-definition plugin's skeleton — stage-definition plugins fill
  the named slots at install time. The resolved workflow is written to
  .orqa/workflows/agile-methodology.resolved.yaml.

initial_state: discover

contribution_points:
  - name: discovery-artifacts
    stage: discover
    description: "Contribute discovery artifact types and research workflows."
    required: true

  - name: planning-methodology
    stage: plan
    description: "Contribute planning methodology (scoping, estimation, prioritisation)."
    required: true

  - name: documentation-standards
    stage: document
    description: "Contribute documentation standards and templates."
    required: true

  - name: implementation-workflow
    stage: implement
    description: "Contribute implementation sub-workflows (task lifecycle, branching strategy)."
    required: true

  - name: review-process
    stage: review
    description: "Contribute review process (code review, gate definitions, acceptance criteria)."
    required: true

  - name: learning-pipeline
    stage: learn
    description: "Contribute learning pipeline (lesson creation, retrospective, pattern tracking)."
    required: true

states:
  discover:
    category: planning
    description: "Discovery stage — exploring the problem space, research, feasibility."
    on_enter:
      - type: append_log
        params:
          message: "Entered discovery stage"

  plan:
    category: planning
    description: "Planning stage — scoping, estimation, task decomposition."
    on_enter:
      - type: append_log
        params:
          message: "Entered planning stage"

  document:
    category: planning
    description: "Documentation stage — capturing decisions, architecture, requirements."

  implement:
    category: active
    description: "Implementation stage — active delivery of tasks."
    on_enter:
      - type: set_field
        params:
          field: implementation_started_at
          value: "${now}"

  review:
    category: review
    description: "Review stage — validating deliverables against acceptance criteria."
    on_enter:
      - type: append_log
        params:
          message: "Entered review stage"

  learn:
    category: completed
    description: "Learning stage — retrospective, lesson capture, process improvement."
    on_enter:
      - type: append_log
        params:
          message: "Entered learning stage"

  done:
    category: terminal
    description: "Delivery complete — all stages finished."
    on_enter:
      - type: set_field
        params:
          field: completed_at
          value: "${now}"

transitions:
  - from: discover
    to: plan
    event: scope_defined
    description: "Discovery complete, move to planning."
    guards:
      - type: field_check
        description: "Must have a description"
        params:
          field: description
          operator: not_empty

  - from: plan
    to: document
    event: plan_approved
    description: "Plan approved, document decisions."

  - from: plan
    to: implement
    event: start_implementation
    description: "Skip documentation, go straight to implementation."

  - from: document
    to: implement
    event: documentation_complete
    description: "Documentation done, begin implementation."

  - from: implement
    to: review
    event: submit_for_review
    description: "Implementation complete, submit for review."
    gate: delivery-review

  - from: review
    to: learn
    event: review_passed
    description: "Review passed, enter learning phase."

  - from: review
    to: implement
    event: review_failed
    description: "Review failed, return to implementation."
    actions:
      - type: append_log
        params:
          message: "Review failed — returning to implementation"

  - from: learn
    to: done
    event: retrospective_complete
    description: "Retrospective done, delivery complete."

  # Stage regressions
  - from: document
    to: plan
    event: replan
    description: "Documentation revealed planning gaps."

  - from: implement
    to: plan
    event: replan
    description: "Implementation revealed planning gaps."

  - from: review
    to: plan
    event: major_rework
    description: "Review found fundamental issues requiring re-planning."

gates:
  delivery-review:
    pattern: structured_review
    description: "Delivery review gate — AI pre-check followed by human review."
    phases:
      gather:
        fields:
          - description
          - priority
          - relationships
        pre_checks:
          - type: relationship_check
            description: "Must have delivered tasks"
            params:
              relationship_type: delivers
              condition: exists
      present:
        sections:
          - title: "Delivery Summary"
            content_field: description
          - title: "Tasks Delivered"
            content_template: "Tasks: ${relationships:delivers}"
      collect:
        verdicts:
          - key: approve
            label: "Approve"
            transitions_to: learn
          - key: request_changes
            label: "Request Changes"
            transitions_to: implement
          - key: major_rework
            label: "Major Rework Required"
            transitions_to: plan
        require_rationale: true
      learn:
        on_fail:
          create_lesson: true
          track_recurrence: true
        on_pass:
          track_cycle_time: true
