## OrqaStudio — Local Git Hosting
##
## Usage:
##   orqa hosting up       Start the server
##   orqa hosting down     Stop the server
##   orqa hosting setup    First-time configuration
##
## Access: http://localhost:10030
## SSH:    ssh://git@localhost:10222

services:
  orqastudio:
    image: codeberg.org/forgejo/forgejo:10
    container_name: orqastudio
    restart: unless-stopped
    environment:
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__server__DOMAIN: localhost
      FORGEJO__server__SSH_DOMAIN: localhost
      FORGEJO__server__ROOT_URL: http://localhost:10030/
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__server__SSH_PORT: "10222"
      FORGEJO__server__DISABLE_SSH: "false"
      FORGEJO__server__LFS_START_SERVER: "true"
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__repository__DEFAULT_BRANCH: main
      FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "true"
      FORGEJO__mirror__ENABLED: "true"
      FORGEJO__mirror__DEFAULT_INTERVAL: 1h
      FORGEJO__actions__ENABLED: "true"
      FORGEJO__service__DISABLE_REGISTRATION: "false"
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
    volumes:
      - orqastudio-data:/data
      - orqastudio-config:/etc/forgejo
    ports:
      - "10030:3000"
      - "10222:22"

volumes:
  orqastudio-data:
  orqastudio-config:
