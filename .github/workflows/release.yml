name: Release

# orqa-mcp-server depends on orqa-search via path = "../search".
# We check out the dev repo with submodules so the relative path resolves,
# then overlay the tagged commit before building.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: orqa-mcp-server.exe
            asset: orqa-mcp-server-windows-x86_64.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: orqa-mcp-server
            asset: orqa-mcp-server-linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: orqa-mcp-server
            asset: orqa-mcp-server-macos-aarch64

    steps:
      - name: Checkout dev repo with submodules
        uses: actions/checkout@v4
        with:
          repository: orqastudio/orqastudio-dev
          submodules: recursive
          ref: main

      - name: Overlay tagged mcp-server commit
        uses: actions/checkout@v4
        with:
          path: libs/mcp-server

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-mcp-cargo-registry-${{ hashFiles('libs/mcp-server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mcp-cargo-registry-

      - name: Validate version matches tag
        working-directory: libs/mcp-server
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CRATE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG" != "$CRATE_VERSION" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CRATE_VERSION}"
            exit 1
          fi

      - name: Build release binary
        working-directory: libs/mcp-server
        run: cargo build --release --bin orqa-mcp-server --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp libs/mcp-server/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
