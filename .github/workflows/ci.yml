name: CI

# orqa-mcp-server depends on orqa-search via path = "../search".
# To resolve this in CI, we check out the dev repo (which has both as
# submodules) and run cargo from within libs/mcp-server/.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout dev repo with submodules
        uses: actions/checkout@v4
        with:
          repository: orqastudio/orqastudio-dev
          submodules: recursive
          # Use the SHA of the mcp-server submodule that triggered this run.
          # For PRs targeting the lib repo directly, the dev repo HEAD is used.
          ref: main

      # If this run was triggered from the lib repo itself (not a dev repo
      # submodule update), overlay the current commit so we test the actual
      # change rather than whatever the dev repo currently pins.
      - name: Overlay current mcp-server commit
        if: github.repository == 'orqastudio/orqastudio-lib-mcp-server'
        uses: actions/checkout@v4
        with:
          path: libs/mcp-server

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-mcp-cargo-registry-${{ hashFiles('libs/mcp-server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mcp-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: libs/mcp-server/target/
          key: ${{ runner.os }}-mcp-cargo-target-${{ hashFiles('libs/mcp-server/Cargo.lock') }}-${{ hashFiles('libs/mcp-server/src/**/*.rs', 'libs/search/src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-mcp-cargo-target-${{ hashFiles('libs/mcp-server/Cargo.lock') }}-
            ${{ runner.os }}-mcp-cargo-target-

      - name: Check formatting
        working-directory: libs/mcp-server
        run: cargo fmt --check

      - name: Lint (clippy)
        working-directory: libs/mcp-server
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: libs/mcp-server
        run: cargo test

      - name: Build release binary
        working-directory: libs/mcp-server
        run: cargo build --release --bin orqa-mcp-server
